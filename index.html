<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription à la Newsletter</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>

    <section class="container">
        <h1>Rejoignez notre entraide</h1>
        <p>Laissez vos coordonnées pour recevoir nos prochains messages et acceder aux reunions de facon automatique</p>

        <form id="contactForm">
            <div class="form-group">
                <label for="nom">Nom</label>
                <input type="text" id="nom" required placeholder="Ex: Mouyockolo">
            </div>

            <div class="form-group">
                <label for="prenom">Prénom</label>
                <input type="text" id="prenom" required placeholder="Ex: Chrislain">
            </div>

            <div class="form-group">
                <label for="email">Adresse Email</label>
                <input type="email" id="email" required placeholder="Ex: adeininfo@gmail.com">
            </div>
            
            <div class="form-group">
                <label for="tel">Telephone</label>
                <input type="tel" id="tel" required placeholder="Ex: + 242 05 568 34 79">
            </div>
            <button type="submit" id="btnSubmit">S'inscrire</button>
        </form>

        <div id="responseMessage" class="message"></div>
    </section>

    <script src="./scritp.js"></script>

</body>
</html>
